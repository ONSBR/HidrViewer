name: Release (Windows)

# Builds the Windows installers and attaches them to a GitHub Release.
#
# Flow (matches how v0.0.1 was cut, minus the manual build):
#   1. You create the GitHub Release in the UI, tagged vX.Y.Z, with the
#      release notes. The tag MUST match the version in the app manifests.
#   2. On "published", this workflow spins up a Windows runner, verifies the
#      tag matches the committed version, runs `tauri build`, and uploads the
#      NSIS (-setup.exe) and MSI installers as assets on that same release.
#
# WebView2 is preinstalled on GitHub-hosted windows runners, so nothing extra
# is needed for the runtime dependency.
#
# workflow_dispatch is a build-only dry run: it compiles the installers and
# publishes them as short-lived workflow artifacts (NOT to any release), so the
# build can be validated without cutting a release.

on:
  release:
    types: [published]
  workflow_dispatch: {}

# Don't cancel an in-flight release build if another event lands; each release
# is a distinct, non-redundant artifact.
concurrency:
  group: release-windows-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # required to upload assets onto the release

jobs:
  build-windows:
    name: Build Windows installers (NSIS + MSI)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # Config is the source of truth for the version; the tag must match it.
      # tauri derives the installer FILENAME from tauri.conf.json's version, so
      # a mismatch would ship e.g. HidrViewer_1.0.0_... under a v0.0.2 release.
      # We check all three manifests so they can never silently drift apart.
      - name: Verify release tag matches app version
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ github.event.release.tag_name }}'
          expected="${tag#v}"

          conf=$(jq -r '.version' src-tauri/tauri.conf.json)
          pkg=$(jq -r '.version' package.json)
          cargo=$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' src-tauri/Cargo.toml | head -n1)

          echo "release tag : $tag  (expected version: $expected)"
          echo "tauri.conf.json: $conf"
          echo "package.json   : $pkg"
          echo "Cargo.toml     : $cargo"

          fail=0
          for pair in "src-tauri/tauri.conf.json:$conf" "package.json:$pkg" "src-tauri/Cargo.toml:$cargo"; do
            name="${pair%%:*}"; val="${pair#*:}"
            if [ "$val" != "$expected" ]; then
              echo "::error file=$name::version '$val' does not match release tag '$tag' (expected '$expected')"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "Bump the version in all three manifests to match the tag, commit, then re-publish the release."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build for the src-tauri crate to keep release builds fast.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Installs @tauri-apps/cli (the `tauri` binary used by the build below).
      # The frontend is prebuilt static assets in frontend/, so there is no
      # separate frontend build step.
      - name: Install Node dependencies
        run: npm ci

      - name: Build and attach installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Bundles come from tauri.conf.json's `"targets": "all"`, which on
          # Windows resolves to exactly NSIS (-setup.exe) + MSI. To change what
          # ships, edit that config key rather than this workflow.
          #
          # On a release event releaseId uploads the installers onto that
          # release. On workflow_dispatch it is empty, so tauri-action only
          # builds (see the dry-run artifact step below).
          releaseId: ${{ github.event.release.id }}

      # Dry-run only: expose the installers as downloadable workflow artifacts
      # when triggered manually, since nothing was uploaded to a release.
      - name: Upload installers as workflow artifacts (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: HidrViewer-windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
