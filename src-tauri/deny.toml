# cargo-deny configuration for HidrViewer — the blocking release gate.
#
#   cargo deny check            # run all checks
#   cargo deny check advisories # RUSTSEC advisories only
#   cargo deny check licenses   # license allow-list only
#
# HidrViewer ships Windows-only, so this gate audits exactly the crates in the
# shipped binary (see [graph].targets). Linux/macOS-only crates (the gtk-rs / glib
# webview stack) are NOT distributed and are therefore out of scope here. A full,
# cross-platform `cargo audit` still runs (non-blocking) in CI for dev-platform
# awareness. See THIRD_PARTY_LICENSES.md §7 for the full posture.

[graph]
# The shipped artifact is Windows x64. Scoping the graph to this triple means the
# 13 Linux-only unmaintained/unsound advisories (gtk-rs, glib, proc-macro-error)
# never enter the check — they are genuinely absent from the distributed binary.
targets = [
    "x86_64-pc-windows-msvc",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# `cargo deny check advisories`
[advisories]
# Fail on any vulnerability or yanked crate. The only advisories reaching the
# Windows binary with no upstream fix are the unmaintained `unic-*` crates, triaged
# below. Revisit whenever Tauri is upgraded — `urlpattern` may drop `unic-*`.
yanked = "deny"
ignore = [
    # unic-* — unmaintained Unicode crates pulled transitively via `urlpattern` in
    # `tauri-utils`. No known vulnerability and no fixed version published. These
    # ARE compiled into the Windows binary, so they are triaged here (rather than
    # excluded by target). HidrViewer cannot drop them without an upstream Tauri change.
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range: unmaintained, no vuln; via urlpattern -> tauri-utils" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common: unmaintained, no vuln; via urlpattern -> tauri-utils" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property: unmaintained, no vuln; via urlpattern -> tauri-utils" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version: unmaintained, no vuln; via urlpattern -> tauri-utils" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident: unmaintained, no vuln; via urlpattern -> tauri-utils" },
]

# ---------------------------------------------------------------------------
# `cargo deny check licenses`
[licenses]
# Permissive licenses accepted for redistribution. Mirrors src-tauri/about.toml.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# ---------------------------------------------------------------------------
# `cargo deny check bans`
[bans]
# Duplicate versions are common in a large framework tree; surface but don't fail.
multiple-versions = "warn"
wildcards = "allow"

# ---------------------------------------------------------------------------
# `cargo deny check sources`
[sources]
# All crates must come from the official crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
