  <div class="header-text">
    <h1>HidrViewer</h1>
    <p>Carregue o arquivo hidr.dat para visualizar os dados cadastrais das usinas</p>
  </div>
  <div class="header-info hidden" id="headerInfo">
    <div class="header-info-item">
      <span class="header-info-label">Registros</span>
      <span class="header-info-value" id="infoRegistros"></span>
    </div>
    <div class="header-info-item">
      <span class="header-info-label">Usinas cadastradas</span>
      <span class="header-info-value" id="infoCadastradas"></span>
    </div>
    <div class="header-info-item">
      <span class="header-info-label">Tamanho por registro</span>
      <span class="header-info-value" id="infoTamReg"></span>
    </div>
    <div class="header-info-item">
      <span class="header-info-label">Formato PCA|PCV</span>
      <span class="header-info-value" id="infoFormato"></span>
    </div>
  </div>
</header>

<div class="container">
  <div class="upload-area" id="dropZone">
    <div class="icon">&#128194;</div>
    <p>Clique ou arraste o arquivo<br><strong>hidr.dat</strong></p>
    <input type="file" id="fileInput" accept=".dat">
  </div>

  <div id="controls" class="hidden">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="tabTabela">Tabela</button>
      <button class="tab-btn" data-tab="tabVisual">Usina</button>
      <div class="tab-bar-actions">
        <button class="btn btn-primary" id="btnReset">Novo arquivo</button>
      </div>
    </div>

    <!-- Barra de fluxos: aparece conforme o formato carregado (Opcao A) -->
    <div id="flowBar" class="flow-bar hidden">
      <div class="flow-group" id="flowWork">
        <span class="flow-title" id="flowWorkTitle">Trabalhar em REAL*8</span>
        <button class="btn btn-secondary" id="btnEdit" disabled title="Carregue um hidr.dat para editar">Editar dados</button>
        <button class="btn btn-secondary" id="btnImportKeep" disabled title="Importa um CSV mantendo o formato atual do arquivo">Importar CSV</button>
        <input type="file" id="fileInputKeep" accept=".csv,.txt" style="display:none">
        <button class="btn btn-secondary" id="btnCSV">Exportar CSV</button>
        <button class="btn btn-secondary" id="btnR8" disabled>Exportar hidr.dat</button>
      </div>
      <div class="flow-group flow-convert hidden" id="flowConvert">
        <span class="flow-title">Converter p/ REAL*8</span>
        <button class="btn btn-secondary" id="btnConvert" title="Importa o CSV e converte o arquivo para REAL*8 (CV/CA como float64 nativo)">Importar CSV → REAL*8</button>
        <input type="file" id="fileInputConvert" accept=".csv,.txt" style="display:none">
        <span class="flow-note" title="grava CV/CA como float64 nativo, sem cauda binaria">float64 nativo</span>
      </div>
    </div>

    <div id="tabTabela" class="tab-content active">
      <div class="filter-row">
        <label>Usina:</label>
        <input type="text" id="filtroNome" placeholder="Filtrar por nome...">
        <label>Codigo:</label>
        <input type="text" id="filtroCod" list="listaCod" placeholder="Num. usina">
        <datalist id="listaCod"></datalist>
        <label>Submercado:</label>
        <select id="filtroSub">
          <option value="">Todos</option>
        </select>
        <span id="addUsinaWrap" class="hidden">
          <label>Adicionar usina nº:</label>
          <input type="number" id="addUsinaNum" min="1" max="600" placeholder="ex.: 417" style="width:7em">
          <button class="btn btn-secondary" id="btnAddUsina" title="Cria os registros em branco necessarios (ate 600) e abre a linha para preenchimento">Adicionar</button>
        </span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div id="tabVisual" class="tab-content">
      <div class="visual-layout">
        <div class="plant-list">
          <input type="text" class="plant-search" id="plantSearch" placeholder="Buscar usina...">
          <div class="plant-cards" id="plantCards"></div>
        </div>
        <div class="plant-detail" id="plantDetail">
          <div class="detail-empty">Selecione uma usina para ver os detalhes</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="hidr_viewer.js"></script>
</body>
</html>
